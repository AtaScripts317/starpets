<!DOCTYPE html>
<html>
<head>
    <title>Starpets Token Tester</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>🔑 Starpets Token Tester</h1>
    <p>Çalışıyor! 🎉</p>
    <textarea id="token" placeholder="JWTStateV2 degerini yapistir..." rows="5" cols="60"></textarea>
    <br>
    <button onclick="test()">Test Et</button>
    <div id="result" style="margin-top:10px; background:#111; padding:10px; font-family:monospace;"></div>

    <script>
        function test() {
            const token = document.getElementById('token').value;
            const resultDiv = document.getElementById('result');
            if (!token) {
                resultDiv.innerHTML = '❌ Token girin!';
                return;
            }
            try {
                const decoded = decodeURIComponent(token);
                const data = JSON.parse(decoded);
                const payload = JSON.parse(atob(data.accessToken.split('.')[1]));
                resultDiv.innerHTML = `
✅ Token decode basarili!<br>
👤 Kullanici: ${payload.sub?.username || 'Bilinmiyor'}<br>
💰 Bakiye: ${payload.sub?.balance?.usd || 'Bilinmiyor'} USD<br>
📧 Email: ${payload.sub?.email || 'Bilinmiyor'}<br>
📅 Olusturulma: ${new Date(payload.iat * 1000).toLocaleString()}<br>
⏰ Bitis: ${new Date(payload.exp * 1000).toLocaleString()}<br>
                `;
            } catch(e) {
                resultDiv.innerHTML = '❌ Hata: ' + e.message;
            }
        }
    </script>
</body>
</html>
