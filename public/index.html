<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Starpets Token Tester</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #0f0; font-family: monospace; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #0f0; padding-bottom: 10px; }
        .tab-btn { background: #1a1a1a; color: #0f0; border: 1px solid #0f0; padding: 10px 20px; cursor: pointer; }
        .tab-btn.active { background: #0f0; color: #000; }
        .tab-pane { display: none; animation: fadeIn 0.3s ease; }
        .tab-pane.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: #111; border: 1px solid #0f0; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        textarea, input { width: 100%; background: #1a1a1a; color: #0f0; border: 1px solid #0f0; padding: 10px; font-family: monospace; }
        textarea { height: 120px; }
        button { background: #0f0; color: #000; padding: 10px 20px; border: none; cursor: pointer; margin-top: 10px; }
        button:hover { background: #0c0; }
        .result { background: #1a1a1a; padding: 15px; margin-top: 15px; border-left: 3px solid #0f0; white-space: pre-wrap; max-height: 400px; overflow-y: auto; }
        .error { border-left-color: #f00; color: #f66; }
        .flex-row { display: flex; gap: 10px; flex-wrap: wrap; }
        select { background: #1a1a1a; color: #0f0; border: 1px solid #0f0; padding: 8px; }
        .info-text { color: #666; font-size: 11px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔑 Starpets Token Tester</h1>
        <div class="subtitle">Token Test | Özel API İsteği</div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('token')">📝 Token Test</button>
            <button class="tab-btn" onclick="switchTab('payload')">📦 Özel Payload</button>
        </div>

        <!-- Tab 1: Token Test -->
        <div id="tab-token" class="tab-pane active">
            <div class="card">
                <h2>📝 JWTStateV2 Token Testi</h2>
                <textarea id="token-input" placeholder="JWTStateV2 degerini yapistir (URL encoded)"></textarea>
                <button onclick="testToken()">🚀 Token Test Et</button>
                <div id="token-result" class="result"></div>
                <div class="info-text">💡 Cloud Code ile Starpets'e istek atilir, CORS sorunu yoktur.</div>
            </div>
        </div>

        <!-- Tab 2: Özel Payload -->
        <div id="tab-payload" class="tab-pane">
            <div class="card">
                <h2>📦 Özel API İsteği</h2>
                <div class="flex-row" style="margin-bottom: 10px;">
                    <select id="payload-method">
                        <option value="GET">GET</option>
                        <option value="POST">POST</option>
                        <option value="PUT">PUT</option>
                        <option value="DELETE">DELETE</option>
                    </select>
                    <input type="text" id="payload-url" placeholder="https://... API URL" style="flex:1;">
                </div>
                <textarea id="payload-body" placeholder='{"key": "value"} (JSON formatinda)'></textarea>
                <div class="flex-row">
                    <input type="text" id="payload-headers" placeholder="Authorization: Bearer token (opsiyonel)">
                    <button onclick="sendPayload()">📡 İsteği Gönder</button>
                </div>
                <div id="payload-result" class="result"></div>
                <div class="info-text">💡 Backend uzerinden istek atilir, CORS engeli asilir.</div>
            </div>
        </div>
    </div>

    <script>
        const APP_ID = 'l54T01o7jvdkUGKJJZau0LQ6rggbqqOZfZsnAfNI';
        const JS_KEY = 'QrgvxaEWdCk6elj8o3eeePOPM5vYj2fMrY4FHlhj';
        
        function switchTab(tab) {
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            event.target.classList.add('active');
        }

        async function testToken() {
            const token = document.getElementById('token-input').value.trim();
            const resultDiv = document.getElementById('token-result');
            const btn = event.target;
            
            if (!token) { resultDiv.innerHTML = '❌ Token girin!'; resultDiv.classList.add('error'); return; }
            
            btn.disabled = true;
            btn.textContent = '⏳ Test Ediliyor...';
            resultDiv.innerHTML = '⏳ Cloud Code calistiriliyor...';
            resultDiv.classList.remove('error');
            
            try {
                const response = await fetch('https://parseapi.back4app.com/functions/testStarpetsLogin', {
                    method: 'POST',
                    headers: { 'X-Parse-Application-Id': APP_ID, 'X-Parse-JavaScript-Key': JS_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token })
                });
                const data = await response.json();
                const result = data.result;
                
                if (result.success) {
                    resultDiv.innerHTML = `
✅ GIRIS BASARILI!
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
👤 Kullanici: ${result.username || 'Bilinmiyor'}
📧 Email: ${result.email || 'Bilinmiyor'}
💰 Token Bakiye: ${result.balance || '0'} USD
📄 Sayfa Bakiye: ${result.page_balance || 'Bulunamadi'}
📊 Status: ${result.status}
⏱️  Sure: ${result.time}s
                    `;
                } else {
                    resultDiv.innerHTML = `❌ GIRIS BASARISIZ!\n${result.message}\nStatus: ${result.status}`;
                    resultDiv.classList.add('error');
                }
            } catch (error) {
                resultDiv.innerHTML = `❌ Hata: ${error.message}`;
                resultDiv.classList.add('error');
            }
            btn.disabled = false;
            btn.textContent = '🚀 Token Test Et';
        }

        async function sendPayload() {
            const method = document.getElementById('payload-method').value;
            const url = document.getElementById('payload-url').value.trim();
            const bodyText = document.getElementById('payload-body').value.trim();
            const headersText = document.getElementById('payload-headers').value.trim();
            const resultDiv = document.getElementById('payload-result');
            const btn = event.target;
            
            if (!url) { resultDiv.innerHTML = '❌ URL girin!'; resultDiv.classList.add('error'); return; }
            
            btn.disabled = true;
            btn.textContent = '⏳ İstek Gönderiliyor...';
            resultDiv.innerHTML = '⏳ Backend üzerinden istek atiliyor...';
            resultDiv.classList.remove('error');
            
            let body = null;
            if (bodyText) {
                try { body = JSON.parse(bodyText); } catch(e) { body = bodyText; }
            }
            let headers = {};
            if (headersText) {
                const parts = headersText.split(':');
                if (parts.length >= 2) headers[parts[0].trim()] = parts.slice(1).join(':').trim();
            }
            
            try {
                const response = await fetch('https://parseapi.back4app.com/functions/sendPayload', {
                    method: 'POST',
                    headers: { 'X-Parse-Application-Id': APP_ID, 'X-Parse-JavaScript-Key': JS_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ method, url, headers, body })
                });
                const data = await response.json();
                const result = data.result;
                resultDiv.innerHTML = `📡 ISTEK SONUCU\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\nStatus: ${result.status}\nSure: ${result.time}s\nResponse:\n${result.responseText || result.error}`;
                if (result.status >= 400) resultDiv.classList.add('error');
            } catch (error) {
                resultDiv.innerHTML = `❌ Hata: ${error.message}`;
                resultDiv.classList.add('error');
            }
            btn.disabled = false;
            btn.textContent = '📡 İsteği Gönder';
        }
    </script>
</body>
</html>
