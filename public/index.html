<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starpets Token Tester</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            color: #0f0;
            font-family: 'Courier New', monospace;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #0f0;
            margin-bottom: 20px;
            font-size: 28px;
        }
        .card {
            background: #111;
            border: 1px solid #0f0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .card h2 {
            margin-bottom: 15px;
            font-size: 18px;
            color: #0f0;
        }
        textarea {
            width: 100%;
            height: 150px;
            background: #1a1a1a;
            color: #0f0;
            border: 1px solid #0f0;
            font-family: monospace;
            padding: 10px;
            font-size: 12px;
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: #0f0;
            box-shadow: 0 0 5px #0f0;
        }
        button {
            background: #0f0;
            color: #000;
            padding: 12px 24px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
            border-radius: 4px;
        }
        button:hover {
            background: #0c0;
            transform: scale(1.02);
        }
        .result {
            margin-top: 20px;
            background: #1a1a1a;
            padding: 15px;
            border-left: 3px solid #0f0;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
        }
        .error {
            border-left-color: #f00;
            color: #f66;
        }
        .info {
            color: #666;
            font-size: 11px;
            text-align: center;
            margin-top: 20px;
        }
        .success {
            color: #0f0;
        }
        hr {
            border-color: #0f0;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔑 Starpets Token Tester</h1>
        
        <div class="card">
            <h2>📝 Token Girisi</h2>
            <textarea id="token" placeholder="JWTStateV2 degerini (URL encoded) yapistir..."></textarea>
            <br>
            <button onclick="testToken()">🔍 Token Decode Et</button>
        </div>
        
        <div id="result" class="result"></div>
        
        <div class="info">
            ⚠️ Not: Bu araç token'i decode eder. Gercek giris testi icin proxy ve cloud code gereklidir.
        </div>
    </div>

    <script>
        function testToken() {
            const token = document.getElementById('token').value.trim();
            const resultDiv = document.getElementById('result');
            
            if (!token) {
                resultDiv.innerHTML = '❌ Lutfen token girin!';
                resultDiv.classList.add('error');
                return;
            }
            
            resultDiv.classList.remove('error');
            resultDiv.innerHTML = '⏳ Decode ediliyor...';
            
            try {
                // URL decode
                const decoded = decodeURIComponent(token);
                const tokenData = JSON.parse(decoded);
                
                let accessInfo = '';
                try {
                    // JWT decode
                    const parts = tokenData.accessToken.split('.');
                    if (parts.length === 3) {
                        const payload = JSON.parse(atob(parts[1]));
                        const iatDate = new Date(payload.iat * 1000);
                        const expDate = new Date(payload.exp * 1000);
                        const username = payload.sub?.username || 'Bilinmiyor';
                        const balance = payload.sub?.balance?.usd || 'Bilinmiyor';
                        
                        accessInfo = `
📅 Olusturulma: ${iatDate.toLocaleString('tr-TR')}
⏰ Bitis: ${expDate.toLocaleString('tr-TR')}
👤 Kullanici: ${username}
💰 Bakiye: ${balance} USD
📊 Durum: ${payload.sub?.confirmed ? 'Onayli' : 'Onaysiz'}
                        `;
                    } else {
                        accessInfo = '⚠️ JWT formatı hatali';
                    }
                } catch(e) {
                    accessInfo = '⚠️ JWT decode edilemedi: ' + e.message;
                }
                
                resultDiv.innerHTML = `
✅ <strong>Token decode basarili!</strong>
<hr>
📝 Token uzunlugu: ${decoded.length} karakter
<hr>
${accessInfo}
<hr>
🔑 <strong>Access Token</strong> (ilk 80 karakter):
${tokenData.accessToken.substring(0, 80)}...
<hr>
🔄 <strong>Refresh Token</strong> (ilk 80 karakter):
${tokenData.refreshToken.substring(0, 80)}...
                `;
                
            } catch(e) {
                resultDiv.innerHTML = `❌ Decode hatasi: ${e.message}`;
                resultDiv.classList.add('error');
            }
        }
        
        // Enter tusu ile test et
        document.getElementById('token').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                testToken();
            }
        });
    </script>
</body>
</html>
