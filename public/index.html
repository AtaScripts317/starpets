<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starpets Token Tester</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #0f0;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; }
        .card {
            background: #111;
            border: 1px solid #0f0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .card h2 { margin-bottom: 15px; font-size: 18px; }
        textarea {
            width: 100%;
            height: 150px;
            background: #1a1a1a;
            color: #0f0;
            border: 1px solid #0f0;
            font-family: monospace;
            padding: 10px;
            resize: vertical;
        }
        button {
            background: #0f0;
            color: #000;
            padding: 12px 24px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            border-radius: 4px;
        }
        button:hover { background: #0c0; transform: scale(1.02); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .result {
            margin-top: 20px;
            background: #1a1a1a;
            padding: 15px;
            border-left: 3px solid #0f0;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 500px;
            overflow-y: auto;
        }
        .error { border-left-color: #f00; color: #f66; }
        .warning { border-left-color: #ff0; color: #ff0; }
        .info { color: #666; font-size: 11px; text-align: center; margin-top: 20px; }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #0f0;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .flex { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .proxy-input {
            background: #1a1a1a;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 8px;
            font-family: monospace;
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔑 Starpets Token Tester</h1>
        
        <div class="card">
            <h2>📝 Token Bilgileri</h2>
            <textarea id="token" placeholder="JWTStateV2 degerini (URL encoded) yapistir..."></textarea>
            <div class="flex" style="margin-top: 10px;">
                <button onclick="decodeToken()">🔍 Sadece Decode Et</button>
                <button onclick="testLogin()" id="testBtn">🚀 Giriş Testi Yap</button>
            </div>
        </div>
        
        <div class="card">
            <h2>🌐 Proxy (Opsiyonel)</h2>
            <input type="text" id="proxy" class="proxy-input" placeholder="HTTP proxy: http://user:pass@ip:port (veya bos birak)">
            <div class="info" style="margin-top: 5px;">⚠️ Not: CORS engeli nedeniyle proxy zorunlu olabilir. Ucretsiz proxy'ler genelde calismaz.</div>
        </div>
        
        <div id="result" class="result"></div>
        <div class="info">💡 Ipucu: CORS hatasi alirsaniz, tarayici eklentisi veya proxy kullanmaniz gerekebilir.</div>
    </div>

    <script>
        let isTesting = false;
        
        function log(message, isError = false, isWarning = false) {
            const resultDiv = document.getElementById('result');
            const prefix = isError ? '❌ ' : (isWarning ? '⚠️ ' : '✅ ');
            resultDiv.innerHTML += `${prefix}${message}\n`;
            resultDiv.scrollTop = resultDiv.scrollHeight;
            if (isError) resultDiv.classList.add('error');
            if (isWarning) resultDiv.classList.add('warning');
        }
        
        function clearLog() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '';
            resultDiv.classList.remove('error', 'warning');
        }
        
        function decodeToken() {
            const token = document.getElementById('token').value.trim();
            if (!token) {
                alert('Lutfen token girin');
                return;
            }
            
            clearLog();
            log('Token decode ediliyor...');
            
            try {
                const decoded = decodeURIComponent(token);
                const tokenData = JSON.parse(decoded);
                const accessToken = tokenData.accessToken;
                
                // JWT decode
                let payload = null;
                try {
                    const parts = accessToken.split('.');
                    if (parts.length === 3) {
                        payload = JSON.parse(atob(parts[1]));
                    }
                } catch(e) {}
                
                log(`Token uzunlugu: ${decoded.length} karakter`);
                log(`Access Token (ilk 100): ${accessToken.substring(0, 100)}...`);
                log(`Refresh Token (ilk 100): ${tokenData.refreshToken.substring(0, 100)}...`);
                
                if (payload) {
                    log(`--- JWT Icerigi ---`);
                    log(`Kullanici: ${payload.sub?.username || 'Bilinmiyor'}`);
                    log(`Email: ${payload.sub?.email || 'Bilinmiyor'}`);
                    log(`Bakiye USD: ${payload.sub?.balance?.usd || '0'} $`);
                    log(`Olusturulma: ${new Date(payload.iat * 1000).toLocaleString()}`);
                    log(`Bitis: ${new Date(payload.exp * 1000).toLocaleString()}`);
                    log(`Onay Durumu: ${payload.sub?.confirmed ? 'Onayli' : 'Onaysiz'}`);
                }
                
                log('--- Decode Tamamlandi ---');
                
            } catch(e) {
                log(`Decode hatasi: ${e.message}`, true);
            }
        }
        
        async function testLogin() {
            if (isTesting) {
                log('Zaten test yapiliyor...', false, true);
                return;
            }
            
            const token = document.getElementById('token').value.trim();
            if (!token) {
                alert('Lutfen token girin');
                return;
            }
            
            isTesting = true;
            const testBtn = document.getElementById('testBtn');
            testBtn.disabled = true;
            testBtn.innerHTML = '⏳ Test Yapiliyor...';
            clearLog();
            
            log('Giris testi baslatiliyor...');
            log('Starpets.gg\'ye istek atiliyor...');
            
            try {
                // Token'ı decode et
                const decoded = decodeURIComponent(token);
                const tokenData = JSON.parse(decoded);
                
                // Fetch ile istek at
                const response = await fetch('https://starpets.gg/tr/adopt-me/', {
                    method: 'GET',
                    headers: {
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
                        'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9',
                        'Accept-Language': 'tr-TR,tr;q=0.9,en-US;q=0.8,en;q=0.7',
                        'Cookie': `jwtStateV2=${encodeURIComponent(JSON.stringify(tokenData))}`
                    },
                    mode: 'cors',
                    credentials: 'include'
                });
                
                log(`HTTP Status: ${response.status}`);
                
                const text = await response.text();
                const lowerText = text.toLowerCase();
                
                if (response.status === 200) {
                    if (lowerText.includes('login') || lowerText.includes('sign in') || lowerText.includes('giris yap')) {
                        log('❌ Giris BASARISIZ! Login sayfasina yonlendirildi.', true);
                        log('Token gecersiz veya suresi dolmus olabilir.', true);
                    } else {
                        log('✅ GIRIS BASARILI!', false);
                        log('Sayfa basariyla yuklendi.');
                        
                        // Bakiye ara
                        const balanceMatch = text.match(/(\d+\.?\d*)\s*USD/);
                        if (balanceMatch) {
                            log(`💰 Bulunan bakiye: ${balanceMatch[1]} USD`);
                        }
                        
                        // Kullanici adi ara
                        const userMatch = text.match(/<span[^>]*class="[^"]*username[^"]*"[^>]*>([^<]+)<\/span>/i);
                        if (userMatch) {
                            log(`👤 Kullanici: ${userMatch[1]}`);
                        }
                        
                        // Sayfa basligi
                        const titleMatch = text.match(/<title>(.*?)<\/title>/i);
                        if (titleMatch) {
                            log(`📄 Sayfa: ${titleMatch[1]}`);
                        }
                    }
                } else if (response.status === 401) {
                    log('❌ Giris BASARISIZ! (401 Unauthorized)', true);
                    log('Token gecersiz veya suresi dolmus.', true);
                } else if (response.status === 403) {
                    log('❌ Giris BASARISIZ! (403 Forbidden)', true);
                    log('IP veya cihaz engeli olabilir.', true);
                } else {
                    log(`❌ Beklenmeyen durum: HTTP ${response.status}`, true);
                }
                
            } catch (error) {
                log(`HATA: ${error.message}`, true);
                
                if (error.message.includes('CORS') || error.message.includes('fetch')) {
                    log('', false);
                    log('--- CORS HATASI ---', false, true);
                    log('Bu hata, tarayici guvenlik nedeniyle baska siteye istek atmanizi engelliyor.', false, true);
                    log('Cozumler:', false, true);
                    log('1. "Allow CORS" tarayici eklentisi kullanin', false, true);
                    log('2. Proxy kullanarak istek atin', false, true);
                    log('3. Back4App Cloud Code ile backend uzerinden test yapin', false, true);
                }
            }
            
            isTesting = false;
            testBtn.disabled = false;
            testBtn.innerHTML = '🚀 Giriş Testi Yap';
            log('--- Test Tamamlandi ---');
        }
        
        // Enter + Ctrl ile test
        document.getElementById('token').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                testLogin();
            }
        });
    </script>
</body>
</html>
