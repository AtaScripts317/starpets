server {
    listen 80;
    server_name _;
    root /app/public;
    index index.html;
    
    location / {
        try_files $uri $uri/ =404;
    }
    
    # API endpoint'leri için cloud code proxy
    location /api/ {
        proxy_pass http://localhost:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
